<VirtualHost *:80>
    servername localhost
    ServerAdmin localhost
    DocumentRoot /var/www/html/site/webroot

    <Directory /var/www/html/site/webroot>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    Alias /img/imoveis /var/www/html/cms/webroot/img/imoveis
    <Directory /var/www/html/cms/webroot/img/imoveis>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
<VirtualHost *:80>
    servername cms.localhost
    ServerAdmin localhost
    DocumentRoot /var/www/html/cms/webroot

    <Directory /var/www/html/cms/webroot>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
